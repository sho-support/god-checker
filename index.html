<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマスロミリオンゴッド 〜神々の軌跡〜 出目チェッカー</title>

<style>
body{
  font-family:sans-serif;
  background:radial-gradient(circle at top,#3a2600,#111 45%,#050505);
  color:#fff;
  text-align:center;
  padding:18px;
  margin:0;
}
h1{
  font-size:24px;
  color:#f7d36a;
  text-shadow:0 0 14px #b8860b;
}
#display{
  margin:18px auto;
  font-size:36px;
  letter-spacing:6px;
  background:#111;
  padding:15px;
  border-radius:12px;
  width:200px;
}
button{
  padding:12px;
  margin:5px;
  font-size:18px;
  border-radius:8px;
}
.keypad{
  display:grid;
  grid-template-columns:repeat(3,80px);
  justify-content:center;
}
.live-result{
  position:fixed;
  right:10px;
  top:120px;
  width:180px;
  background:#000;
  border:2px solid gold;
  padding:10px;
  border-radius:10px;
  font-size:12px;
}
</style>
</head>

<body>

<h1>スマスロミリオンゴッド<br>〜神々の軌跡〜</h1>

<div id="display">---</div>

<div class="keypad">
<button onclick="pressKey('1')">1</button>
<button onclick="pressKey('2')">2</button>
<button onclick="pressKey('3')">3</button>
<button onclick="pressKey('4')">4</button>
<button onclick="pressKey('5')">5</button>
<button onclick="pressKey('6')">6</button>
<button onclick="pressKey('7')">7</button>
<button onclick="pressKey('8')">8</button>
<button onclick="pressKey('0')">0</button>
<button onclick="pressKey('V')">V</button>
<button onclick="backspace()">←</button>
<button onclick="clearInput()">C</button>
</div>

<div id="result"></div>

<h2>設定判別</h2>

回転数：<input id="gameCount" type="number"><br>
初当り：<input id="hitCount" type="number"><br>

<button onclick="calcSetting()">計算</button>

<div id="directResult"></div>

<div id="liveResult" class="live-result">入力待ち</div>

<script>
/* =========================
   出目データ（完全版）
========================= */
const data = {

/* リーチ目系 */
"007":{name:"ネタ",reach:true},
"012":{name:"朝イチ目",reach:true},
"026":{name:"お風呂",reach:true},
"032":{name:"おさつ",reach:true},
"038":{name:"大宮",reach:true},
"046":{name:"お城",reach:true},
"075":{name:"おなご",reach:true},
"081":{name:"オッパイ",reach:true},
"104":{name:"天使",reach:true},
"110":{name:"110番",reach:true},
"123":{name:"旧朝イチ目",reach:true},
"135":{name:"G-ZONE目",reach:true},
"168":{name:"いろは",reach:true},
"175":{name:"イナゴ",reach:true},
"184":{name:"イワシ",reach:true},
"201":{name:"匂い",reach:true},
"223":{name:"富士山",reach:true},
"280":{name:"ニーハオ",reach:true},
"283":{name:"翼",reach:true},
"315":{name:"最高",reach:true},
"324":{name:"MIZUHO",reach:true},
"344":{name:"サシシ",reach:true},
"354":{name:"神輿",reach:true},
"365":{name:"365日",reach:true},
"415":{name:"よいこ",reach:true},
"423":{name:"しじみ",reach:true},
"428":{name:"四谷",reach:true},
"448":{name:"使者",reach:true},
"481":{name:"支配",reach:true},
"508":{name:"ゴーヤ",reach:true},
"510":{name:"GOD",guarantee:"GOD系",reach:true},
"514":{name:"来いよ",reach:true},
"526":{name:"小次郎",reach:true},
"543":{name:"暦",reach:true},
"564":{name:"殺し",reach:true},
"634":{name:"武蔵",reach:true},
"664":{name:"ろくむし",reach:true},
"681":{name:"無敗",reach:true},
"728":{name:"浪速",reach:true},
"753":{name:"七五三",reach:true},
"758":{name:"名古屋",reach:true},
"801":{name:"ハワイ",reach:true},
"808":{name:"八百屋",reach:true},
"821":{name:"ハニー",reach:true},
"841":{name:"弥生",reach:true},
"845":{name:"梯子",reach:true},
"850":{name:"ハチ公",reach:true},
"873":{name:"花見",reach:true},
"884":{name:"林",reach:true},

/* 確定系 */
"777":{name:"GOD揃い",guarantee:"PGG濃厚"},
"000":{name:"Z-ZONE",guarantee:"AT確定"},
"VVV":{name:"V揃い",guarantee:"3セット以上"},

/* V系 */
"V0V":{name:"Vモード",guarantee:"Vモード"},
"V1V":{name:"天国以上",guarantee:"天国"},
"V3V":{name:"天国以上",guarantee:"天国"},
"V5V":{name:"天国以上",guarantee:"天国"},
"V7V":{name:"天国以上",guarantee:"天国"},

/* チャンス目 */
"468":{name:"ヨーロッパ",chance:true},
"631":{name:"無罪",chance:true},
"831":{name:"野菜",chance:true},

/* モード示唆 */
"234":{name:"偶数順目",level:3},
"456":{name:"偶数順目",level:3},
"678":{name:"偶数順目",level:3},
"567":{name:"奇数順目",level:5},
"155":{name:"奇数テンパイ",level:4},
"633":{name:"偶数→奇数テンパイ",level:2}

};
/* =========================
   入力制御
========================= */
let current = "";

function pressKey(k){
  if(current.length >= 3){
    current = "";
    document.getElementById("result").innerHTML = "";
  }

  current += k;
  document.getElementById("display").innerText = current;

  if(current.length === 3){
    check(current);
  }
}

function backspace(){
  current = current.slice(0, -1);
  document.getElementById("display").innerText = current || "---";
}

function clearInput(){
  current = "";
  document.getElementById("display").innerText = "---";
  document.getElementById("result").innerHTML = "";
}

/* =========================
   パターン補完
========================= */
function patternCheck(code){
  if(!/^[0-8]{3}$/.test(code)) return null;

  let a = +code[0];
  let b = +code[1];
  let c = +code[2];

  if(a === b && b === c && a % 2 === 1){
    return {name:"奇数揃い", guarantee:"AT濃厚!? "};
  }

  if(a+1 === b && b+1 === c){
    return {name:"順目", level:(a%2===0)?3:5};
  }

  if(b === c && b % 2 === 1){
    return {name:"奇数テンパイ", level:4};
  }

  return null;
}

/* =========================
   出目判定
========================= */
function check(code){
  let r = data[code] || patternCheck(code);
  let out = document.getElementById("result");

  if(!r){
    out.innerHTML = "該当なし<br><span style='font-size:12px;color:#ccc;'>通常出目</span>";
    return;
  }

  let html = "";
  html += "<b>"+code+"</b><br>";
  html += "<span style='color:#ffdf6b;font-size:22px;'>"+r.name+"</span><br>";

  if(r.reach) html += "<span style='color:#00e5ff'>リーチ目</span><br>";
  if(r.chance) html += "<span style='color:#ff9f1c'>チャンス目</span><br>";
  if(r.level) html += "モード期待度："+r.level+"/8<br>";
  if(r.guarantee) html += "<span style='color:#ff5a5a'>"+r.guarantee+"</span>";

  out.innerHTML = html;
}

/* =========================
   設定判別
========================= */
function calcSetting(){
  const g = Number(document.getElementById("gameCount").value);
  const h = Number(document.getElementById("hitCount").value);

  if(!g || !h) return;

  const odds = {
    1:532.8,
    2:420.4,
    3:495.9,
    4:338.4,
    5:455.4,
    6:294.8
  };

  let logs = [];
  let max = -Infinity;

  for(let s=1;s<=6;s++){
    let p = 1 / odds[s];
    let log = h*Math.log(p) + (g-h)*Math.log(1-p);
    logs.push({s,log});
    if(log > max) max = log;
  }

  let sum = 0;

  logs.forEach(x=>{
    x.w = Math.exp(x.log - max);
    sum += x.w;
  });

  let expected = 0;

  logs.forEach(x=>{
    let pct = x.w / sum;
    expected += x.s * pct;
  });

  let html = "";
  html += "<b style='color:#ffdf6b;font-size:22px;'>推定設定："+expected.toFixed(1)+"</b><br><br>";
  html += "初当り：1/"+(g/h).toFixed(1)+"<br><br>";

  logs.forEach(x=>{
    let pct = x.w/sum*100;
    html += "設定"+x.s+"："+pct.toFixed(1)+"%<br>";
  });

  document.getElementById("directResult").innerHTML = html;
}

/* =========================
   リアルタイム表示
========================= */
function updateLive(){
  const g = Number(document.getElementById("gameCount").value);
  const h = Number(document.getElementById("hitCount").value);

  if(!g || !h){
    document.getElementById("liveResult").innerHTML = "入力待ち";
    return;
  }

  document.getElementById("liveResult").innerHTML =
    "<b>リアルタイム</b><br><br>"+
    "G："+g+"<br>"+
    "当り："+h+"<br>"+
    "<b>1/"+(g/h).toFixed(1)+"</b>";
}

setInterval(updateLive, 500);
</script>
</body>
</html>
